<app-page-shell>
  <div class="page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Reportes y exportación</h1>
        <p class="page-subtitle">Generación mock CSV, Excel y PDF</p>
      </div>
    </header>

    <div class="report-grid">
      @for (item of items; track item.tipo) {
        <section class="panel report-card">
          <h3>{{ item.titulo }}</h3>
          <p>{{ item.desc }}</p>
          <div class="report-btns">
            <button type="button" class="btn btn-outline btn-sm" [disabled]="exportando()" (click)="exportar(item.tipo, 'csv')">CSV</button>
            <button type="button" class="btn btn-outline btn-sm" [disabled]="exportando()" (click)="exportar(item.tipo, 'excel')">Excel</button>
            <button type="button" class="btn btn-primary btn-sm" [disabled]="exportando()" (click)="exportar(item.tipo, 'pdf')">PDF</button>
          </div>
        </section>
      }
    </div>
  </div>
</app-page-shell>
