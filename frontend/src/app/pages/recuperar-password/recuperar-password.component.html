<div class="login-page">
  <div class="login-card panel">
  @if (!enviado()) {
    <h1>Recuperar contraseña</h1>
    <p class="login-sub">Simulación mock — se enviará un enlace ficticio</p>
    <form [formGroup]="form" (ngSubmit)="enviar()">
      <label>
        Correo electrónico
        <input type="email" formControlName="correo" placeholder="usuario@netguard.com" />
      </label>
      @if (error()) {
        <p class="login-error">{{ error() }}</p>
      }
      <button type="submit" class="btn btn-primary btn-block" [disabled]="cargando()">
        {{ cargando() ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </form>
  } @else {
    <div class="success-box">
      <span class="success-icon">✓</span>
      <h2>Revisa tu correo (mock)</h2>
      <p>Se simuló el envío del enlace de recuperación.</p>
      <button type="button" class="btn btn-primary" (click)="volverLogin()">Volver al login</button>
    </div>
  }
  <a [routerLink]="['/', routes.LOGIN]" class="back-link">← Volver al inicio de sesión</a>
  </div>
</div>
